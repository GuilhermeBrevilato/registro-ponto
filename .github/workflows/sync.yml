name: Sync Dados Ponto

on:
  repository_dispatch:
    types: [sync-data]

permissions:
  contents: write

jobs:
  sync:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GH_PAT }}

      - name: Salvar dados
        env:
          PAYLOAD: ${{ toJson(github.event.client_payload.data) }}
        run: |
          mkdir -p dados
          python3 -c "
          import os, json
          payload = os.environ['PAYLOAD']
          data = json.loads(payload)
          with open('dados/backup.json', 'w', encoding='utf-8') as f:
              json.dump(data, f, ensure_ascii=False, indent=2)
          print('Dados salvos com sucesso')
          "

      - name: Commit
        run: |
          git config user.name  "Sync Bot"
          git config user.email "sync@registro-ponto"
          git add dados/backup.json
          git diff --cached --quiet || git commit -m "sync: $(date -u '+%d/%m/%Y %H:%M') UTC"
          git push
