name: Sync Dados Ponto

on:
  repository_dispatch:
    types: [sync-data]

permissions:
  contents: write

jobs:
  sync:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GH_PAT }}

      - name: Salvar dados
        uses: actions/github-script@v7
        with:
          script: |
            const fs = require('fs');
            const path = require('path');
            const data = context.payload.client_payload.data;
            const dir = path.join(process.env.GITHUB_WORKSPACE, 'dados');
            if (!fs.existsSync(dir)) fs.mkdirSync(dir, { recursive: true });
            fs.writeFileSync(
              path.join(dir, 'backup.json'),
              JSON.stringify(data, null, 2),
              'utf8'
            );
            console.log('Dados salvos:', Object.keys(data));

      - name: Commit
        run: |
          git config user.name  "Sync Bot"
          git config user.email "sync@registro-ponto"
          git add dados/backup.json
          git diff --cached --quiet && echo "Sem alterações" && exit 0
          git commit -m "sync: $(date -u '+%d/%m/%Y %H:%M') UTC"
          git pull --rebase origin main || git rebase --abort
          git push --force-with-lease || git push
