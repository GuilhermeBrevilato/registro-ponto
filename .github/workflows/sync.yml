name: Sync Dados Ponto

on:
  repository_dispatch:
    types: [sync-data]

permissions:
  contents: write

jobs:
  sync:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GH_PAT }}

      - name: Salvar dados
        run: |
          mkdir -p dados
          echo '${{ toJson(github.event.client_payload.data) }}' > dados/backup.json

      - name: Commit
        run: |
          git config user.name  "Sync Bot"
          git config user.email "sync@registro-ponto"
          git add dados/backup.json
          git diff --cached --quiet || git commit -m "sync: $(date -u '+%d/%m/%Y %H:%M') UTC"
          git push
